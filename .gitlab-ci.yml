stages:
  - compare

get_changed_files:
  stage: compare
  script:
    # 获取完整仓库历史（避免浅克隆导致无法比较分支）
    - git fetch origin master:master
    - git fetch origin stage:stage
    # 对比 master 和 stage 分支的差异，提取文件名
    - git diff --name-only master...stage > changed_files.txt
    # 显示结果（可选）
    - cat changed_files.txt
    - echo "提交信息：$CI_COMMIT_MESSAGE"
    # 将文件名存入变量，供后续使用（可选）
    - export CHANGED_FILES=$(cat changed_files.txt)

    # 获取当前提交的详细信息（包含提交人）
    - author_line=$(git config --global user.name "$(git log -1 --pretty=format:'%an')"_
    - echo "提交信息：$author_line"
  artifacts:
    paths:
      - changed_files.txt
  only:
    - stage
  tags:
    - kunlun-runner    
