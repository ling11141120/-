stages:
  - deploy

generate_json:
  stage: deploy
  script:
    - |

      # 获取完整仓库历史（避免浅克隆导致无法比较分支）
      git fetch origin master:master
      git fetch origin stage:stage


      # 对比 master 和 stage 分支的差异，提取文件名
      git diff --name-only master...stage > changed_files.txt


      # 显示结果（可选）
      cat changed_files.txt
      echo "提交信息：$CI_COMMIT_MESSAGE"


      # 将文件名存入变量，供后续使用
      export CHANGED_FILES=$(cat changed_files.txt | grep -v ".gitlab-ci.yml")
      echo $CHANGED_FILES 

      # 获取当前提交的详细信息（包含提交人）
      author_line=$(git log -1 --pretty=format:'%an')
      echo $author_line

      # 遍历数组
      for file in "${CHANGED_FILES[@]}"; do
        # 转义变量中的特殊字符（如双引号）
        safe_commit_message=$(echo "$CI_COMMIT_MESSAGE" | sed 's/"/\\"/g')
        safe_file_content=$(echo "$file" | sed 's/"/\\"/g' | tr '\n' ' ')
        echo $safe_file_content

        # 正确闭合 JSON 结构
        curl -X POST \
          http://192.168.21.192:8866/bigData/webhook/commit \
          -H "Content-Type: application/json" \
          -d "{
            \"commitBy\": \"$author_line\",
            \"commitInfo\": \"$safe_commit_message\",
            \"fileInfos\": {
              \"fileName\": \"$file\",
              \"content\": \"$safe_file_content\"
            }
          }"  # 闭合 JSON 和引号
      done
      
  artifacts:
    paths:
      - changed_files.txt
  only:
    - stage
  tags:
    - kunlun-runner