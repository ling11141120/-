stages:
  - test
  - auto-merge
  - notification

validate_source_branch:
  stage: test
  script:
    - |
      # 仅当目标分支是 master 时执行检查
      if [ "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" = "master" ]; then
        # 检查源分支是否以 "stage/" 开头（如 stage/feature-x）
        if [[ ! "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" = "stage" ]]; then
          echo "错误：仅允许从 stage 分支合并到 master！当前源分支：$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
          exit 1
        fi
      fi
  only:
    refs:
      - merge_requests
    variables:
      - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"  # 仅针对目标分支为 master 的 MR
  tags:
    - kunlun-runner


auto_merge_mr:
  stage: auto-merge
  script:
    - |
      # 1. 检查合并冲突状态（GitLab 11.x 需手动调用 API 检测）
      echo "MR_STATUS=1"
      MR_STATUS=$(curl -s --header "PRIVATE-TOKEN: Bbh_-quZT5VeCYWNqtGh" \
        "https://gitlab.changdu.ltd/api/v4/projects/1156/merge_requests/${CI_MERGE_REQUEST_IID}" | jq -r '.merge_status')
      echo "MR_STATUS=$MR_STATUS"
      echo "当前 MR IID: ${CI_MERGE_REQUEST_IID}"
      echo "API 请求 URL: https://gitlab.baidu.com/api/v4/projects/1156/merge_requests/${CI_MERGE_REQUEST_IID}/merge"      
      echo "当前 PIPELINE IID: $CI_PIPELINE_ID"
      
      
      # 2. 仅当可合并时执行自动合并
      if [ "$MR_STATUS" = "can_be_merged" ]; then
        curl --request PUT \
          --header "PRIVATE-TOKEN: Bbh_-quZT5VeCYWNqtGh" \
          --header "Content-Type: application/json" \
          --data '{
            "merge_commit_message": "Auto-merged via CI",
            "merge_when_pipeline_succeeds": true
        }' \
        "https://gitlab.changdu.ltd/api/v4/projects/1156/merge_requests/${CI_MERGE_REQUEST_IID}/merge"
      else
        echo "存在合并冲突，无法自动合并"
        exit 1
      fi
      
  only:
    refs:
      - merge_requests  # 仅针对合并请求触发（旧版本语法）
    variables:
      - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"  # 目标分支为 master
  when: on_success
  tags:
    - kunlun-runner

call_dolphinscheduler_api:
  stage: notification 
  script:
    - |
      echo "调用dolphinscheduler API: http://192.168.100.219:30667/default/dolphinscheduler/gitCheckout"
      API_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://192.168.100.219:30667/default/dolphinscheduler/gitCheckout")

      if [ "$API_RESPONSE" = "200" ]; then
        echo "dolphinscheduler API调用成功"
      else
        echo "dolphinscheduler API调用失败，HTTP状态码: $API_RESPONSE"
        # 这里不退出失败，因为合并已经成功，API调用是附加操作
      fi

  only:
    refs:
      - merge_requests  # 仅针对合并请求触发（旧版本语法）
    variables:
      - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"  # 目标分支为 master
  when: on_success
  tags:
    - kunlun-runner
