# ============================================================
# Program 状态跟踪 — P-YYYY-NNN
# ============================================================

program: P-YYYY-NNN
name: {任务标题}
phase: planning              # planning / in-progress / review / done
status: not-started          # not-started / active / blocked / deployed
last_updated: {yyyy-mm-dd}

# ==================== 任务列表 ====================
tasks:
  - id: t1
    name: {任务描述}
    status: pending          # pending / in-progress / done / blocked
    checkpoint:              # 当前进度描述（in-progress 时填写）
    blockers:                # 堵点（blocked 时填写）
    next_action:             # 下一步具体操作

  - id: t2
    name: {任务描述}
    status: pending
    checkpoint:
    blockers:
    next_action:

# ==================== 产物清单 ====================
artifacts:
  plan: workspace/PLAN.md
  ddl: []
  dml: []
  validation: []