# ============================================================
# Program 状态跟踪 — P-YYYY-NNN
# ============================================================

program: P-YYYY-NNN
name: {任务标题}
type: development            # development（开发类）| analysis（分析类）
subtype: none                # 开发类填 none；分析类填 batch / deep-dive / ad-hoc
phase: planning              # 开发类: planning / in-progress / review / done
                             # 分析类: planning / data-collection / analysis / synthesis / review / done
status: not-started          # not-started / active / blocked / deployed
last_updated: {yyyy-mm-dd}

# ==================== 任务列表 — 开发类 ====================
tasks:
  - id: t1
    name: {任务描述}
    status: pending          # pending / in-progress / done / blocked
    checkpoint:              # 当前进度描述（in-progress 时填写）
    blockers:                # 堵点（blocked 时填写）
    next_action:             # 下一步具体操作

  - id: t2
    name: {任务描述}
    status: pending
    checkpoint:
    blockers:
    next_action:

