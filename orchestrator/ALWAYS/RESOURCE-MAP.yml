# 资源索引 — 数仓项目架构、基础设施、数据分层
#
# 此文件描述 dolphinscheduler 数仓项目的全貌

# ==================== 仓库信息 ====================
repo:
  name: dolphinscheduler
  path: D:\IdeaProjects\dolphinscheduler
  git: (GitLab 仓库)
  desc: 短视频/短剧数据仓库项目（StarRocks）
  lang: SQL
  main_branch: master
  dev_branch: stage
  naming_branch: "dev+{owner}+{jira}+{desc}"

# ==================== 数仓分层架构 ====================
data_layers:
  ods:
    path: starrocks/ods/
    desc: 操作数据层 — 原始业务数据接入
    count: 111
  ods_log:
    path: starrocks/ods_log/
    desc: 日志数据层 — 埋点/传感器日志接入
    count: 31
  dwd:
    path: starrocks/dwd/
    desc: 数据明细层 — 清洗、标准化、脱敏
    count: 65
    key_tables:
      - dwd.dwd_sensors_cd_video_endwatching_view  # 结束观看事件（替代旧 epis_history）
      - dwd.dwd_video_short_video_epis_history      # 旧观看历史（待废弃）
  dwm:
    path: starrocks/dwm/
    desc: 数据中间层 — 轻度汇总
    count: 3
  dws:
    path: starrocks/dws/
    desc: 数据服务层 — 主题宽表
    count: 67
    key_tables:
      - dws.dws_user_short_video_wide_active_period_ed  # 用户活跃宽表
  dim:
    path: starrocks/dim/
    desc: 维度层 — 维度表（DDL + DML）
    count: 45
    key_tables:
      - dim.dim_short_video_epis_view       # 短剧集维表
      - dim.dim_short_video_series_view     # 短剧维表
      - dim.dim_short_video_user_accountinfo # 用户维表
      - dim.dim_pub_code_mapping_dict       # 公共字典表
      - dim.dim_sv_user_pay_type_df         # 用户付费类型
  ads:
    path: starrocks/ads/
    desc: 应用数据层 — 面向业务的统计表
    count: 216
    sub_dirs:
      ddl: starrocks/ads/ddl/  # 表定义
      dml: starrocks/ads/dml/  # 数据加载逻辑（DolphinScheduler 调度）
    key_tables:
      - ads.ads_sv_beidou_series_daily_stat_di    # 北斗-每日短剧统计
      - ads.ads_sv_beidou_series_epis_stat_di     # 北斗-每集观看统计
      - ads.ads_sv_beidou_series_play_trend_hi    # 北斗-播放趋势(小时)
      - ads.ads_sv_beidou_series_source_stat_di   # 北斗-来源统计
      - ads.ads_sv_beidou_series_user_type_di     # 北斗-用户分类统计

# ==================== SQL 文件命名规范 ====================
naming_conventions:
  ddl: "{table_name}.sql"                    # 如 ads_sv_beidou_series_daily_stat_di.sql
  dml: "P_{table_name}.sql"                  # 如 P_ads_sv_beidou_series_daily_stat_di.sql
  table: "{layer}_{business}_{subject}_{granularity}_{period}"
  # 周期: di=日, hi=小时, df=全量快照, ed=增量

# ==================== 基础设施 ====================
infrastructure:
  database:
    type: StarRocks
    desc: OLAP 分析型数据库
    features:
      - Bitmap 数据类型（用户去重统计）
      - 分区表（按日期 date_trunc 分区）
      - 哈希分布（distributed by hash）
      - CTE 复用（SET cbo_cte_reuse = true）
      - 主键模型（Primary Key）

  scheduler:
    type: DolphinScheduler
    desc: 数据调度平台，管理 ETL 任务依赖和执行
    trigger: GitLab CI → DolphinScheduler API
    params:
      - "${dt}"       # 当前处理日期
      - "${bf_1_dt}"  # 前1天
      - "${bf_4_dt}"  # 前4天（回刷窗口）

  ci_cd:
    type: GitLab CI
    config: .gitlab-ci.yml
    pipeline:
      - 验证源分支（仅允许从 stage 合并到 master）
      - 自动合并 MR
      - 调用 DolphinScheduler API 触发数据管道

# ==================== 业务领域 ====================
business_domains:
  北斗短剧分析:
    desc: 短剧播放统计、用户行为分析、续看率、收入分析
    tables: ads_sv_beidou_series_*
  广告投放分析:
    desc: 广告展示、点击、转化统计
  用户行为分析:
    desc: 用户充值、消费、活跃度分析
  内容分析:
    desc: 书籍、章节、翻译内容统计
  商业化分析:
    desc: 收入、ROI、成本分析

